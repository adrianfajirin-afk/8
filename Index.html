<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Virtual Photobooth Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Montserrat,sans-serif;overflow:hidden}
.page{position:fixed;inset:0}

/* PAGE 1 */
#p1{background:url('cover.jpg') center/cover no-repeat;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.names{font-family:'Great Vibes',cursive;font-size:64px;color:#b08a3c}
.tag{letter-spacing:4px;color:#b08a3c}
.date{font-family:'Cormorant Garamond',serif;font-size:36px;color:#b08a3c;margin-top:18px}
.start{margin-top:200px;padding:14px 30px;border:none;border-radius:999px}

/* PAGE 2 */
#p2{display:none;background:#000;color:#fff;flex-direction:column;justify-content:center;align-items:center}
.cam{width:80vw;height:72vh;max-width:380px;border-radius:22px;overflow:hidden;background:#111}
video{width:100%;height:100%;object-fit:cover}
.controls{display:flex;gap:14px;align-items:center;margin-top:12px}
.flip{width:40px;height:40px;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
.shutter{width:60px;height:60px;border:3px solid #fff;border-radius:50%;background:none}
.shareBtn{padding:10px 16px;border:none;border-radius:999px}

/* PAGE 3 */
#p3{display:none;background:#fff;padding:16px}
.wrap{height:100%;display:flex;flex-direction:column;max-width:430px;margin:auto}
.photo{flex:1;display:flex;justify-content:center}
.photo img{width:100%;max-width:340px}
.card{border:1px solid #e7dfd3;border-radius:24px 24px 0 0;padding:18px}
.title{text-align:center;font-size:14px;color:#666;margin-bottom:12px}
.timer{text-align:center;margin-bottom:8px}
.wave{text-align:center;color:#666;margin-bottom:12px}
.row{display:flex;gap:12px}
.btn{flex:1;height:38px;border:1px solid #e7dfd3;border-radius:12px;background:#fff}
.shareFinal{width:100%;height:52px;margin-top:12px;border:none;border-radius:999px}

/* PAGE 4 */
#p4{display:none;background:#f7f3ed}
.header{height:70px;display:flex;align-items:center;justify-content:center;color:#9b7a3b;font-size:24px;font-weight:bold}
.content{height:calc(100vh - 140px);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#777}
.bottom{position:fixed;bottom:0;left:0;right:0;height:70px;background:#fff;border-top:1px solid #ddd;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="p1" class="page">
<div class="names">Agis & Ilmi</div>
<div class="tag">FOREVER STARTS HERE</div>
<div class="date">26.03.2026</div>
<button class="start" onclick="openCam()">📸 Ambil Foto Yu</button>
</div>

<div id="p2" class="page">
<div class="cam"><video id="video" autoplay playsinline></video></div>
<div class="controls">
<div class="flip" onclick="flipCam()">⇄</div>
<button class="shutter"></button>
<button class="shareBtn" onclick="showP3()">Share Moment</button>
</div>
</div>

<div id="p3" class="page">
<div class="wrap">
<div style="font-size:28px;margin-bottom:10px;cursor:pointer" onclick="showP2()">←</div>
<div class="photo"><img src="frame.png"></div>

<div class="card">
<div class="title">Tinggalkan pesan baik untuk pengantin</div>
<div id="timer" class="timer">00:00</div>
<div class="wave">▁▂▃▄▅▆▅▄▃▂▁</div>

<div class="row">
<button id="mainBtn" class="btn">● Rekam</button>
<button id="deleteBtn" class="btn">🗑 Hapus</button>
</div>

<button class="shareFinal" onclick="showP4()">✨ Share Yuk!</button>
</div>
</div>
</div>

<div id="p4" class="page">
<div class="header">♥ Our Memories</div>
<div class="content">
<div style="font-size:52px;color:#c0a06a">♡</div>
<h3>Belum Ada Moment</h3>
<p>Jadilah yang pertama membagikan momenmu</p>
</div>
<div class="bottom" onclick="home()">🏠 Home</div>
</div>

<script>
let stream,facing='user';
async function startCam(){
 if(stream) stream.getTracks().forEach(t=>t.stop());
 stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing}});
 video.srcObject=stream;
}
async function openCam(){p1.style.display='none';p2.style.display='flex';await startCam();}
async function flipCam(){facing=facing==='user'?'environment':'user';await startCam();}
function showP2(){p3.style.display='none';p2.style.display='flex';}
function showP3(){p2.style.display='none';p3.style.display='block';}
function showP4(){p3.style.display='none';p4.style.display='block';}
function home(){p4.style.display='none';p1.style.display='flex';}

/* AUDIO */
let recorder,chunks=[],audioUrl=null,audio=null,state='idle',sec=0,tick=null;
const mainBtn=document.getElementById('mainBtn');
const deleteBtn=document.getElementById('deleteBtn');
const timer=document.getElementById('timer');

function draw(){timer.textContent=String(Math.floor(sec/60)).padStart(2,'0')+":"+String(sec%60).padStart(2,'0');}

mainBtn.onclick=async ()=>{
 if(state==='idle'){
   const s=await navigator.mediaDevices.getUserMedia({audio:true});
   recorder=new MediaRecorder(s);
   chunks=[];
   recorder.ondataavailable=e=>chunks.push(e.data);
   recorder.onstop=()=>{
      audioUrl=URL.createObjectURL(new Blob(chunks,{type:'audio/webm'}));
      state='recorded';
      mainBtn.textContent='▶ Putar';
   };
   sec=0; draw();
   tick=setInterval(()=>{sec++;draw();},1000);
   recorder.start();
   state='recording';
   mainBtn.textContent='■ Stop';
 } else if(state==='recording'){
   clearInterval(tick);
   recorder.stop();
 } else if(state==='recorded'){
   audio=new Audio(audioUrl);
   audio.play();
   state='playing';
   mainBtn.textContent='⏸ Jeda';
   audio.onended=()=>{state='recorded';mainBtn.textContent='▶ Putar';};
 } else if(state==='playing'){
   audio.pause();
   state='recorded';
   mainBtn.textContent='▶ Putar';
 }
};

deleteBtn.onclick=()=>{
 if(audio) audio.pause();
 state='idle';
 audioUrl=null;
 sec=0;
 draw();
 mainBtn.textContent='● Rekam';
};
</script>

</body>
</html>
